url: https://choxos.github.io/cpaic/

template:
  bootstrap: 5

reference:
- title: Network setup
  desc: Build a (possibly disconnected) component network and code components.
  contents:
  - cpaic_network
  - build_C_matrix
- title: Connectivity and estimability
  desc: >
    Detect disconnection, and check which relative effects the component design
    can actually identify. Reconnecting a network does not guarantee that the
    effects you want are estimable, and both engines will otherwise return a
    confident-looking number for a contrast that carries no information.
  contents:
  - cpaic_connectivity
  - estimable_effects
  - estimable_effects_at
- title: Connection layer
  desc: Reconnect a disconnected network through shared components.
  contents:
  - cnma_bridge
  - additivity_test
- title: Population adjustment
  desc: Anchored, population-adjusted indirect comparison across the network.
  contents:
  - cmaic
  - cstc
  - cmlnmr
  - effective_sample_size
  - edge_influence
- title: Hierarchies
  desc: >
    Rank treatments or components IN A TARGET POPULATION. Because component
    effects are population-specific under population adjustment, so are the
    rankings: a component can lead in one population and trail in another.
  contents:
  - cpaic_ranks
  - rank_curve
  - rank_probs
- title: Reporting
  contents:
  - relative_effects
  - league_table
  - component_effects
- title: Plots
  desc: >
    Every plot returns a ggplot object, so it can be modified with the usual
    ggplot2 verbs. The network, forest, rankogram, deviance, prior-posterior,
    integration-error, MCMC, and survival plots are ported from multinma
    (Phillippo et al. 2020). The rank curve, the estimability map, and the
    edge-influence plot are specific to cpaic: under population adjustment the
    hierarchy, and the estimable set itself, are functions of the target
    population.
  contents:
  - plot.cpaic_network
  - forest
  - plot_rank_curve
  - plot_estimability
  - plot_edge_influence
  - plot.cpaic_rank_probs
  - plot.cpaic_ranks
  - plot.cpaic_dic
  - plot_leverage
  - plot_prior_posterior
  - plot_integration_error
  - plot.cpaic_mlnmr
  - plot_survival
  - geom_km
- title: Bayesian diagnostics
  contents:
  - dic
  - loo.cpaic_mlnmr
  - waic.cpaic_mlnmr
  - prior_sensitivity
  - prior_predictive_check
- title: Data
  contents:
  - cpaic_bin_agd
  - cpaic_bin_ipd

articles:
- title: Getting started
  navbar: ~
  contents:
  - cpaic-intro
  - cpaic-methods
- title: Worked examples, by outcome type
  navbar: Outcomes
  desc: >
    Each example plants a known truth, then asks whether the method recovers it.
    All four fit Stan models and are pre-rendered, so they are not re-run at
    build time.
  contents:
  - binary-outcomes
  - continuous-outcomes
  - count-outcomes
  - survival-outcomes
- title: Disconnected networks
  navbar: ~
  contents:
  - cpaic-disconnected-myeloma
