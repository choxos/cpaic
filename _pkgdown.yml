url: https://choxos.github.io/cpaic/

template:
  bootstrap: 5

reference:
- title: Network setup
  desc: Build a (possibly disconnected) component network and code components.
  contents:
  - cpaic_network
  - build_C_matrix
- title: Connectivity and estimability
  desc: >
    Detect disconnection, and check which relative effects the component design
    can actually identify. Reconnecting a network does not guarantee that the
    effects you want are estimable, and both engines will otherwise return a
    confident-looking number for a contrast that carries no information.
  contents:
  - cpaic_connectivity
  - estimable_effects
  - estimable_effects_at
- title: Connection layer
  desc: Reconnect a disconnected network through shared components.
  contents:
  - cnma_bridge
  - additivity_test
- title: Population adjustment
  desc: Anchored, population-adjusted indirect comparison across the network.
  contents:
  - cmaic
  - cstc
  - cmlnmr
  - effective_sample_size
- title: Hierarchies
  desc: >
    Rank treatments or components IN A TARGET POPULATION. Because component
    effects are population-specific under population adjustment, so are the
    rankings: a component can lead in one population and trail in another.
  contents:
  - cpaic_ranks
  - rank_curve
- title: Reporting and visualization
  contents:
  - relative_effects
  - league_table
  - component_effects
  - forest
  - plot.cpaic_network
- title: Data
  contents:
  - cpaic_bin_agd
  - cpaic_bin_ipd

articles:
- title: Articles
  navbar: ~
  contents:
  - cpaic-intro
  - cpaic-methods
  - cpaic-disconnected-myeloma
