# Exercises the Bayesian (cmdstanr) engine that R CMD check skips on CRAN:
# installs a pinned CmdStan, compiles a model, and runs a small end-to-end fit.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'   # weekly, to catch upstream CmdStan drift

name: stan-smoke.yaml

permissions: read-all

jobs:
  stan-smoke:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            stan-dev/cmdstanr
            any::devtools
            any::testthat

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        run: |
          cmdstanr::check_cmdstan_toolchain(fix = TRUE)
          if (is.null(tryCatch(cmdstanr::cmdstan_path(), error = function(e) NULL))) {
            cmdstanr::install_cmdstan(cores = 2, quiet = TRUE)
          }
        shell: Rscript {0}

      - name: Compile a model and run a smoke fit
        run: |
          devtools::load_all()
          set.seed(1)
          ipd <- data.frame(.study = "S1",
                            .trt = rep(c("Placebo", "A"), each = 40),
                            .y = rbinom(80, 1, 0.5), x1 = rnorm(80))
          agd <- data.frame(.study = "S2", .trt = c("Placebo", "A+B"),
                            r = c(18, 26), n = c(40, 40),
                            x1_mean = c(0.2, 0.2), x1_sd = c(1, 1))
          fit <- cmlnmr(ipd, agd, effect_modifiers = "x1", inactive = "Placebo",
                        chains = 2, iter_warmup = 400, iter_sampling = 400,
                        seed = 1)
          stopifnot(nrow(fit$components) == 2L,
                    all(is.finite(fit$components$estimate)))
          re <- relative_effects(fit, newdata = data.frame(x1 = 0.2))
          stopifnot("basis" %in% names(re))
          cat("Stan smoke fit OK; max Rhat =",
              round(fit$diagnostics$max_rhat, 3), "\n")
        shell: Rscript {0}
